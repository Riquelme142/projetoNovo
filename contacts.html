<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacts</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --accent: #c8f135;
      --accent2: #8be0f7;
      --text: #f0f0f5;
      --muted: #7a7a90;
      --danger: #ff5f6d;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE TEXTURE */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(14, 14, 16, 0.9);
      backdrop-filter: blur(16px);
      z-index: 100;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--accent);
    }

    .header-count {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #0e0e10;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-add:hover {
      background: #d9ff50;
      transform: translateY(-1px);
    }

    .btn-add:active {
      transform: translateY(0);
    }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 40px;
    }

    /* SEARCH */
    .search-bar {
      position: relative;
      margin-bottom: 32px;
    }

    .search-bar input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px 14px 48px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
    }

    .search-bar input::placeholder {
      color: var(--muted);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--muted);
    }

    .empty p {
      color: var(--muted);
      margin-top: 8px;
      font-size: 14px;
    }

    /* CONTACTS GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      transition: all 0.2s;
      cursor: default;
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.3s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .card:hover {
      border-color: #3e3e50;
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: #0e0e10;
      margin-bottom: 16px;
    }

    .card-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .card-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .card-field .icon {
      font-size: 14px;
      flex-shrink: 0;
    }

    .card-field .value {
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-obs {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-edit,
    .btn-delete {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
    }

    .btn-edit {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }

    .btn-edit:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-delete {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    .btn-delete:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(255, 95, 109, 0.08);
    }

    /* MODAL OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: overlayIn 0.2s ease;
    }

    @keyframes overlayIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 480px;
      padding: 32px;
      animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 28px;
    }

    .modal-title span {
      color: var(--accent);
    }

    .field-group {
      margin-bottom: 18px;
    }

    .field-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .field-group input,
    .field-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field-group input:focus,
    .field-group textarea:focus {
      border-color: var(--accent);
    }

    .field-group input::placeholder,
    .field-group textarea::placeholder {
      color: var(--muted);
    }

    .field-group textarea {
      resize: vertical;
      min-height: 90px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .btn-cancel {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-cancel:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    .btn-save {
      flex: 2;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: #0e0e10;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-save:hover {
      background: #d9ff50;
    }

    /* DELETE CONFIRM */
    .confirm-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      width: 100%;
      max-width: 380px;
      padding: 32px;
      text-align: center;
      animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .confirm-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .confirm-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .confirm-msg {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .confirm-actions {
      display: flex;
      gap: 12px;
    }

    .btn-confirm-delete {
      flex: 2;
      background: var(--danger);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: #fff;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-confirm-delete:hover {
      background: #ff3344;
    }

    @media (max-width: 600px) {
      header {
        padding: 16px 20px;
      }

      main {
        padding: 24px 20px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">con<span>tacts</span></div>
    <div class="header-count" id="headerCount">0 contacts</div>
    <button class="btn-add" onclick="openCreate()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v12M2 8h12" stroke="#0e0e10" stroke-width="2.5" stroke-linecap="round" />
      </svg>
      New Contact
    </button>
  </header>

  <main>
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="7.5" cy="7.5" r="5.5" stroke="#7a7a90" stroke-width="1.8" />
        <path d="M11.5 11.5L16 16" stroke="#7a7a90" stroke-width="1.8" stroke-linecap="round" />
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name, phone, email…" oninput="renderContacts()" />
    </div>
    <div class="grid" id="contactsGrid"></div>
  </main>

  <div class="overlay" id="formOverlay" style="display:none" onclick="handleOverlayClick(event)">
    <div class="modal" id="formModal">
      <div class="modal-title" id="formTitle">New <span>Contact</span></div>
      <div class="field-group">
        <label>Full Name *</label>
        <input type="text" id="fieldName" placeholder="John Doe" />
      </div>
      <div class="field-group">
        <label>Phone</label>
        <input type="tel" id="fieldPhone" placeholder="+1 (555) 000-0000" />
      </div>
      <div class="field-group">
        <label>Email</label>
        <input type="email" id="fieldEmail" placeholder="john@example.com" />
      </div>
      <div class="field-group">
        <label>Observation</label>
        <textarea id="fieldObs" placeholder="Notes, tags, how you met…"></textarea>
      </div>
      <div id="formError" style="color:var(--danger);font-size:13px;margin-top:-8px;display:none">Name is required.
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeForm()">Cancel</button>
        <button class="btn-save" id="btnSave" onclick="saveContact()">Save Contact</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="deleteOverlay" style="display:none" onclick="handleDeleteOverlayClick(event)">
    <div class="confirm-modal" id="deleteModal">
      <div class="confirm-icon">🗑️</div>
      <div class="confirm-title">Delete Contact?</div>
      <div class="confirm-msg">This action cannot be undone.</div>
      <div class="confirm-actions">
        <button class="btn-cancel" onclick="closeDelete()">Cancel</button>
        <button class="btn-confirm-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // CONFIGURAÇÃO SUPABASE - COLOQUE SEUS DADOS AQUI
    const SB_URL = 'https://qsorwnbohdsphiillrio.supabase.co';
    const SB_KEY = 'SUA_CHAVE_ANON_AQUI';
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    let contacts = [];
    let editingId = null;
    let deletingId = null;


    // CARREGAR DO BANCO (Substitui localStorage)
    async function load() {
      try {
        const { data, error } = await _supabase
          .from('Contatos')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        contacts = data || [];
        renderContacts();
      } catch (e) {
        console.error("Erro ao carregar:", e.message);
      }
    }

    function getInitials(name) {
      if (!name) return '?';
      return name.trim().split(' ').slice(0, 2).map(w => w[0]).join('').toUpperCase();
    }

    function escHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function renderContacts() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = contacts.filter(c =>
        (c.name || '').toLowerCase().includes(query) ||
        (c.phone || '').toLowerCase().includes(query) ||
        (c.email || '').toLowerCase().includes(query)
      );

      const grid = document.getElementById('contactsGrid');
      const count = contacts.length;
      document.getElementById('headerCount').textContent = count + (count === 1 ? ' contact' : ' contacts');

      if (contacts.length === 0) {
        grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">📋</div>
          <h2>No contacts yet</h2>
          <p>Click "New Contact" to get started</p>
        </div>`;
        return;
      }

      if (filtered.length === 0) {
        grid.innerHTML = `
        <div class="empty" style="grid-column:1/-1">
          <div class="empty-icon">🔍</div>
          <h2>No results found</h2>
          <p>Try a different search term</p>
        </div>`;
        return;
      }

      grid.innerHTML = filtered.map(c => `
      <div class="card">
        <div class="card-avatar">${escHtml(getInitials(c.name))}</div>
        <div class="card-name">${escHtml(c.name)}</div>
        ${c.phone ? `<div class="card-field"><span class="icon">📞</span><span class="value">${escHtml(c.phone)}</span></div>` : ''}
        ${c.email ? `<div class="card-field"><span class="icon">✉️</span><span class="value">${escHtml(c.email)}</span></div>` : ''}
        ${c.obs ? `<div class="card-obs">💬 ${escHtml(c.obs)}</div>` : ''}
        <div class="card-actions">
          <button class="btn-edit" onclick="openEdit(${c.id})">Edit</button>
          <button class="btn-delete" onclick="openDelete(${c.id})">Delete</button>
        </div>
      </div>
    `).join('');
    }

    function openCreate() {
      editingId = null;
      document.getElementById('formTitle').innerHTML = 'New <span>Contact</span>';
      document.getElementById('fieldName').value = '';
      document.getElementById('fieldPhone').value = '';
      document.getElementById('fieldEmail').value = '';
      document.getElementById('fieldObs').value = '';
      document.getElementById('formError').style.display = 'none';
      document.getElementById('formOverlay').style.display = 'flex';
      setTimeout(() => document.getElementById('fieldName').focus(), 100);
    }

    function openEdit(id) {
      const c = contacts.find(x => x.id === id);
      if (!c) return;
      editingId = id;
      document.getElementById('formTitle').innerHTML = 'Edit <span>Contact</span>';
      document.getElementById('fieldName').value = c.name;
      document.getElementById('fieldPhone').value = c.phone;
      document.getElementById('fieldEmail').value = c.email;
      document.getElementById('fieldObs').value = c.obs;
      document.getElementById('formError').style.display = 'none';
      document.getElementById('formOverlay').style.display = 'flex';
      setTimeout(() => document.getElementById('fieldName').focus(), 100);
    }

    function closeForm() {
      document.getElementById('formOverlay').style.display = 'none';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('formOverlay')) closeForm();
    }

    // SALVAR NO SUPABASE (Substitui save antigo)
    async function saveContact() {
      const btn = document.getElementById('btnSave');
      const name = document.getElementById('fieldName').value.trim();

      if (!name) {
        document.getElementById('formError').style.display = 'block';
        document.getElementById('fieldName').focus();
        return;
      }

      btn.disabled = true;
      btn.textContent = "Saving...";

      const payload = {
        name,
        phone: document.getElementById('fieldPhone').value.trim(),
        email: document.getElementById('fieldEmail').value.trim(),
        obs: document.getElementById('fieldObs').value.trim(),
      };

      try {
        if (editingId) {
          await _supabase.from('Contatos').update(payload).eq('id', editingId);
        } else {
          await _supabase.from('Contatos').insert([payload]);
        }
        closeForm();
        load(); // Recarrega a lista do banco
      } catch (e) {
        alert("Erro ao salvar contato.");
      } finally {
        btn.disabled = false;
        btn.textContent = "Save Contact";
      }
    }

    function openDelete(id) {
      deletingId = id;
      document.getElementById('deleteOverlay').style.display = 'flex';
    }

    function closeDelete() {
      document.getElementById('deleteOverlay').style.display = 'none';
      deletingId = null;
    }

    function handleDeleteOverlayClick(e) {
      if (e.target === document.getElementById('deleteOverlay')) closeDelete();
    }

    // DELETAR NO SUPABASE
    async function confirmDelete() {
      try {
        await _supabase.from('Contatos').delete().eq('id', deletingId);
        closeDelete();
        load();
      } catch (e) {
        alert("Erro ao deletar.");
      }
    }

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeForm(); closeDelete(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveContact();
    });

    // Inicializa carregando do banco
    load();
  </script>
</body>

</html>
